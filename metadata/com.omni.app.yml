AutoName: Omni
Summary: Video and audio downloader powered by yt-dlp
Description: |-
  Omni is a free, open-source media hub that downloads video and audio
  from 700+ platforms and plays them back with a built-in ExoPlayer.

  Powered by yt-dlp and FFmpeg, it supports downloads up to 4K 60fps
  for video and 320kbps for audio. The format picker shows only the
  qualities that actually exist for each video with no fake options.

  Features include background playback, Picture-in-Picture, a MiniPlayer,
  lock screen media controls, embedded thumbnails in audio files,
  a Favorites library, and a Material You interface that adapts to
  your wallpaper.

  No ads. No tracking. No account required.

